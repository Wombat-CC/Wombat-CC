name: CI

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    build:
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
            fail-fast: false
        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v6

            - uses: mlugg/setup-zig@v2
              with:
                  version: 0.15.2

            - name: Build (aarch64-linux, ReleaseFast)
              run: zig build -Doptimize=ReleaseFast

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: botball_user_program-${{ matrix.os }}
                  path: zig-out/bin/botball_user_program
