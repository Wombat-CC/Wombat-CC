name: CI

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    build:
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
            fail-fast: false
        runs-on: ${{ matrix.os }}
        env:
            ZIG_VERSION: 0.15.2

        steps:
            - uses: actions/checkout@v6

            - uses: mlugg/setup-zig@v2.2.1
              with:
                  version: ${{ env.ZIG_VERSION }}

            - name: Cache Zig build artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      .zig-cache
                      zig-cache
                      ${{ runner.os == 'Windows' && '~\\AppData\\Local\\zig' || '~/.cache/zig' }}
                  key: ${{ runner.os }}-zig-${{ env.ZIG_VERSION }}-${{ hashFiles('build.zig', 'build.zig.zon', 'build/extract_kipr.zig') }}
                  restore-keys: |
                      ${{ runner.os }}-zig-${{ env.ZIG_VERSION }}-

            - name: Fast compile check (aarch64-linux, Debug)
              run: zig build check -Doptimize=Debug -Dfast_ci=true
