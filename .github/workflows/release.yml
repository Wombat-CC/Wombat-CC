name: Release on Tag

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build-and-release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: mlugg/setup-zig@v2
              with:
                  version: 0.15.2

            - name: Build (aarch64-linux, ReleaseFast)
              run: zig build -Doptimize=ReleaseFast

            - name: Create Release and Upload Binary
              uses: softprops/action-gh-release@v2
              with:
                  name: ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  files: zig-out/bin/botball_user_program
