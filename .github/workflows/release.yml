name: Release on Tag

on:
    push:
        tags:
            - "v*"

jobs:
    build-and-release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            - name: Build with build.py (Docker toolchain)
              run: python3 build.py --ci --config configs/config.prod.yaml

            - name: Create Release and Upload Binary
              uses: softprops/action-gh-release@v1
              with:
                  name: ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  files: ./out/build/botball_user_program
