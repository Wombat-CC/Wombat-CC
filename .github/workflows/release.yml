name: Release on Tag

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        env:
            ZIG_VERSION: 0.15.2

        steps:
            - uses: actions/checkout@v6

            - name: Verify tagged version marker (template repo)
              if: github.repository == 'Wombat-CC/Wombat-CC'
              env:
                  RELEASE_TAG: ${{ github.ref_name }}
              run: |
                  set -euo pipefail
                  CURRENT_TAG_FILE="$(tr -d '\r\n' < .wombat-cc-version)"
                  if [ "$CURRENT_TAG_FILE" != "$RELEASE_TAG" ]; then
                    echo "::error::.wombat-cc-version ('$CURRENT_TAG_FILE') does not match pushed tag '$RELEASE_TAG'."
                    echo "::error::Install/use the local pre-push release hook and re-push the tag."
                    exit 1
                  fi

            - uses: mlugg/setup-zig@v2.2.1
              if: github.repository != 'Wombat-CC/Wombat-CC'
              with:
                  version: ${{ env.ZIG_VERSION }}

            - name: Cache Zig build artifacts
              if: github.repository != 'Wombat-CC/Wombat-CC'
              uses: actions/cache@v4
              with:
                  path: |
                      .zig-cache
                      zig-cache
                      ~/.cache/zig
                  key: ${{ runner.os }}-zig-${{ env.ZIG_VERSION }}-${{ hashFiles('build.zig', 'build.zig.zon', 'build/extract_kipr.zig') }}
                  restore-keys: |
                      ${{ runner.os }}-zig-${{ env.ZIG_VERSION }}-

            - name: Build (aarch64-linux, ReleaseFast)
              if: github.repository != 'Wombat-CC/Wombat-CC'
              run: zig build -Doptimize=ReleaseFast

            - name: Create Release (no binary for template repo)
              if: github.repository == 'Wombat-CC/Wombat-CC'
              uses: softprops/action-gh-release@v2
              with:
                  name: ${{ github.ref_name }}
                  draft: false
                  prerelease: false

            - name: Create Release and Upload Binary
              if: github.repository != 'Wombat-CC/Wombat-CC'
              uses: softprops/action-gh-release@v2
              with:
                  name: ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  files: zig-out/bin/botball_user_program
