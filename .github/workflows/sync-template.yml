name: Sync Template

on:
    schedule:
        - cron: "0 9 * * 1" # Every Monday at 9:00 UTC
    workflow_dispatch:
        inputs:
            template_ref:
                description: "Template tag to sync from (leave empty for latest tag)"
                required: false
                default: ""

permissions:
    contents: write
    pull-requests: write

jobs:
    sync:
        runs-on: ubuntu-latest
        # Skip when running inside the template repository itself
        if: github.repository != 'Wombat-CC/Wombat-CC'

        steps:
            - uses: actions/checkout@v6

            - name: Resolve template ref
              id: resolve
              run: |
                  set -e -o pipefail
                  REPO="Wombat-CC/Wombat-CC"
                  MANUAL_REF="${{ github.event.inputs.template_ref }}"

                  if [ -n "$MANUAL_REF" ]; then
                    case "$MANUAL_REF" in
                      *[*?[\]]*)
                        echo "::error::Manual template_ref '$MANUAL_REF' contains invalid glob characters (* ? [ ]) -- failing sync"
                        exit 1
                      ;;
                    esac

                    if ! TAG_MATCH=$(git ls-remote --tags "https://github.com/$REPO.git" \
                      "refs/tags/$MANUAL_REF" "refs/tags/$MANUAL_REF^{}"); then
                      echo "::error::Failed to query template tags from $REPO"
                      exit 1
                    fi

                    TAG_REF=$(printf '%s\n' "$TAG_MATCH" | awk 'NR==1 {print $2}')
                    TAG_BASE=$(printf '%s\n' "$TAG_REF" | sed 's/\^{}$//')
                    if [ "$TAG_BASE" = "refs/tags/$MANUAL_REF" ]; then
                      echo "ref=$MANUAL_REF" >> "$GITHUB_OUTPUT"
                    else
                      echo "::error::Manual template_ref '$MANUAL_REF' is not an existing tag in $REPO — failing sync"
                      exit 1
                    fi
                  else
                    # Resolve the latest tag (sorted by version), filtering out ^{} entries
                    if ! TAG_LIST=$(git ls-remote --tags --sort=-v:refname "https://github.com/$REPO.git"); then
                      echo "::error::Failed to query template tags from $REPO"
                      exit 1
                    fi

                    LATEST_TAG=$(printf '%s\n' "$TAG_LIST" | awk '$2 !~ /\^\{\}$/ {sub(/^.*refs\/tags\//, "", $2); print $2; exit}')
                    if [ -n "$LATEST_TAG" ]; then
                      echo "ref=$LATEST_TAG" >> "$GITHUB_OUTPUT"
                    else
                      echo "::error::No tags found in template repo — no tags available to sync"
                      exit 1
                    fi
                  fi

            - name: Fetch template
              if: steps.resolve.outputs.ref != ''
              run: |
                  REF="${{ steps.resolve.outputs.ref }}"
                  git clone --depth=1 --branch="$REF" \
                    "https://github.com/Wombat-CC/Wombat-CC.git" /tmp/template

                  echo "TEMPLATE_REF=$REF" >> "$GITHUB_ENV"
                  SHA=$(git -C /tmp/template rev-parse --short HEAD)
                  echo "TEMPLATE_SHA=$SHA" >> "$GITHUB_ENV"

            - name: Sync infrastructure files
              if: steps.resolve.outputs.ref != ''
              run: |
                  # Infrastructure files to sync (never touches src/ or build.zig.zon)
                  for f in build.zig .editorconfig .envrc .gitignore flake.nix flake.lock; do
                    [ -f "/tmp/template/$f" ] && cp "/tmp/template/$f" "$f"
                  done

                  # Infrastructure directories (adds/updates files; does not delete
                  # user-added files like custom workflows or extra docs)
                  for d in build .github/workflows docs; do
                    if [ -d "/tmp/template/$d" ]; then
                      mkdir -p "$d"
                      cp -r "/tmp/template/$d/." "$d/"
                    fi
                  done

                  echo "$TEMPLATE_REF" > .wombat-cc-version

            - name: Check for changes
              if: steps.resolve.outputs.ref != ''
              id: diff
              run: |
                  if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Create or update pull request
              if: steps.resolve.outputs.ref != '' && steps.diff.outputs.changed == 'true'
              uses: peter-evans/create-pull-request@v8
              with:
                  branch: auto/sync-template
                  delete-branch: true
                  title: "chore: sync template updates (${{ env.TEMPLATE_REF }})"
                  commit-message: "chore: sync template infrastructure (${{ env.TEMPLATE_REF }})"
                  body: |
                      Automated sync of infrastructure files from the upstream
                      [Wombat CC](https://github.com/Wombat-CC/Wombat-CC) template.

                      **Template version:** `${{ env.TEMPLATE_REF }}` (`${{ env.TEMPLATE_SHA }}`)

                      ### What changed
                      Build scripts, CI workflows, editor configs, and documentation have been
                      updated to match the latest template. **Your source code in `src/` was not
                      modified.**

                      ### Files synced
                      - `build.zig` — build configuration
                      - `build/` — build tools (SDK extractor)
                      - `.github/workflows/` — CI, release, and sync workflows
                      - `docs/` — documentation
                      - `.editorconfig`, `.envrc`, `.gitignore`, `flake.nix`, `flake.lock`

                      ### Files never overwritten
                      - `src/` — your source code
                      - `build.zig.zon` — your project metadata and dependency pins
                      - `README.md` — your project readme

                      > **Tip:** To update the KIPR SDK version separately, run:
                      > `zig fetch --save=wombat_os <new-release-url>`

    update-sdk:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Check for wombat-os updates
              id: check
              run: |
                  # Extract current tag from the URL in build.zig.zon
                  CURRENT=$(sed -n 's|.*kipr/wombat-os/archive/refs/tags/\([^"]*\)\.tar\.gz.*|\1|p' build.zig.zon | head -1)

                  if [ -z "$CURRENT" ]; then
                    echo "::warning::Could not parse current wombat-os version from build.zig.zon"
                    echo "current=" >> "$GITHUB_OUTPUT"
                    echo "latest=" >> "$GITHUB_OUTPUT"
                    echo "update=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  # Get latest stable release tag from kipr/wombat-os
                  LATEST=$(curl -sL \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer ${{ github.token }}" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "https://api.github.com/repos/kipr/wombat-os/releases/latest" \
                    | jq -r '.tag_name // empty')

                  echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
                  echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

                  if [ -z "$LATEST" ]; then
                    echo "::warning::Could not determine latest wombat-os release"
                    echo "update=false" >> "$GITHUB_OUTPUT"
                  elif [ "$CURRENT" = "$LATEST" ]; then
                    echo "wombat-os is up to date ($CURRENT)"
                    echo "update=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "Update available: $CURRENT → $LATEST"
                    echo "update=true" >> "$GITHUB_OUTPUT"
                  fi

            - uses: mlugg/setup-zig@v2
              if: steps.check.outputs.update == 'true'
              with:
                  version: 0.15.2

            - name: Update wombat_os dependency
              if: steps.check.outputs.update == 'true'
              run: |
                  LATEST="${{ steps.check.outputs.latest }}"
                  zig fetch --save=wombat_os \
                    "https://github.com/kipr/wombat-os/archive/refs/tags/${LATEST}.tar.gz"

            - name: Create or update pull request
              if: steps.check.outputs.update == 'true'
              uses: peter-evans/create-pull-request@v8
              with:
                  branch: auto/update-wombat-os
                  delete-branch: true
                  title: "chore: update KIPR SDK to ${{ steps.check.outputs.latest }}"
                  commit-message: "chore: update wombat_os to ${{ steps.check.outputs.latest }}"
                  body: |
                      Automated update of the KIPR SDK dependency in `build.zig.zon`.

                      **Current version:** `${{ steps.check.outputs.current }}`
                      **New version:** `${{ steps.check.outputs.latest }}`

                      The URL and content hash have been updated via `zig fetch --save=wombat_os`.
                      Your source code in `src/` was not modified.

                      ### After merging
                      The next `zig build` will download the new SDK version automatically.

                      ### Release notes
                      See the [wombat-os releases](https://github.com/kipr/wombat-os/releases/tag/${{ steps.check.outputs.latest }}) for details on what changed.
