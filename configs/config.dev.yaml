# Development Build Configuration for Project-XBOT
# Optimized for debugging and development workflow
# Usage: python build.py --config config.dev.yaml

# Docker image to use for cross-compilation
docker_image: sillyfreak/wombat-cross

# Compiler configuration - Development settings
compiler:
  # Cross-compiler executable name
  cross_compiler: aarch64-linux-gnu-g++
  
  # Extra warnings for catching issues early in development
  flags: -Wall -Wextra -Wpedantic
  
  # No optimization for faster compilation and easier debugging
  optimization: -Og
  
  # Include debug symbols for debugging with gdb
  debug: true
  
  # C language standard
  c_standard: c11
  
  # C++ language standard
  cpp_standard: c++17

# Linker configuration
linker:
  # Standard libraries for Botball/KIPR development
  libraries: kipr pthread m z
  
  # No additional linker flags for development
  flags: ""

# Build directory structure
directories:
  source: src
  include: include
  output: out
  objects: obj
  build: build

# Output executable name
output_name: botball_user_program

# Optional: Add DEBUG preprocessor definition for conditional compilation
# Uncomment the line below to enable DEBUG mode
# extra_args: ["-DDEBUG"]
extra_args: []
